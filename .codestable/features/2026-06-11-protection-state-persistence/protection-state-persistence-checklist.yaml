feature: 2026-06-11-protection-state-persistence
created: 2026-06-11

steps:
  - action: "计算节点：实现保护开关状态 store（Load/Save、文件缺失/损坏语义、临时文件 + rename 原子写、目录 0700 文件 0600），归属 internal/protection 新文件"
    exit_signal: "单测覆盖文件缺失、损坏 JSON、正常往返、权限四类场景"
    status: done
  - action: "持久化挂接：EnableProtection / DisableProtection 成功路径写状态文件，默认路径常量在 runtimeconfig 定义并随 Resolve 展开后注入 App"
    exit_signal: "enable 后文件内容 protection_enabled=true，disable 后为 false；Save 失败时命令仍成功且有警告输出"
    status: done
  - action: "启动恢复：app.Run 在 auth store 加载后、startMonitor 与 API server 启动前插入恢复步骤，enabled=true 时只尝试一次运行期 enable，失败告警且不改写状态文件"
    exit_signal: "状态为开启 + Redis 可用 → 启动后 status 显示 enabled；Redis 不可用 → 启动成功、保持关闭、日志有告警且状态文件未被改写"
    status: done
  - action: "测试与文档：补齐验收场景测试，更新用户文档升级说明为保护状态自动恢复，按 attention.md 同步检查 scripts/linux-service.sh 与 docs/user/linux-systemd-deploy.md"
    exit_signal: "go test ./... 通过；文档不再要求升级后重新执行 /protection enable"
    status: done

