feature: 2026-06-10-wechat-send-protection
created: 2026-06-10

steps:
  - action: "编排骨架：新增保护配置与 no-op guard，让 API 和控制台发送入口都能经过同一层保护决策"
    exit_signal: "保护关闭时所有现有发送测试仍通过，且未要求 Redis 配置"
    status: done
  - action: "Redis 状态计算：接入 go-redis，定义 per-bot key、Hash/String 状态和 Lua 脚本返回的 Decision"
    exit_signal: "单元测试能覆盖主动对话重置、普通发送计数、冻结拒绝和 Redis 错误 fail closed"
    status: done
  - action: "计数限制提醒：普通发送成功累计到临界值时发送保护提醒，提醒成功后计数并冻结"
    exit_signal: "第 9 条普通消息成功后触发提醒；之后普通发送被拒绝，直到主动对话"
    status: done
  - action: "24h 时间窗口提醒：新增 per-bot 检查器，按 TTL 判断是否进入提醒窗口"
    exit_signal: "active TTL 进入 time_warning_before 后只发送一次提醒并冻结；重复检查不会重复提醒"
    status: done
  - action: "主动对话解冻：监听收到有效微信消息后重置 Redis 状态，并保持现有 auth store 上下文更新行为"
    exit_signal: "冻结状态下收到主动消息后，下一次普通发送可继续执行并重新计数"
    status: done
  - action: "文档与验收覆盖：补齐 Runtime config 文档、部署默认配置样例和关键行为测试"
    exit_signal: "go test ./... 通过，文档说明保护默认关闭、Redis 配置和冻结错误语义"
    status: done

