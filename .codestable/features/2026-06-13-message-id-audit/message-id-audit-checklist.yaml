feature: 2026-06-13-message-id-audit
created: 2026-06-13

steps:
  - action: "编排骨架：sender 接入 ID 生成器 + Auditor（先用 no-op Auditor + 注入式 idGen），跑通『生成 ID → 拼 finalText（正文+可选保护状态行+ID 行）→ 发送成功后调用 Record』"
    exit_signal: "现有发送测试全绿；发往 ilink 的正文末尾带一行合法 uuid v7；no-op Auditor 下 Record 不报错、不改变发送结果"
    status: done
  - action: "计算节点：实现 internal/audit（Enable/Disable/Enabled/Record + key 构造 {prefix}:audit:time|body:{id} + TTL pipeline 写入 + 按需 otel span）"
    exit_signal: "audit 包单测（miniredis）覆盖：开启写两 key+TTL、关闭 no-op、Redis 写失败返回 error、ctx 有父 span 时产生 span 且无父 span 时不产生"
    status: done
  - action: "运行期开关 + 持久化装配：app 持有 Auditor 并新增 EnableAudit/DisableAudit/PrintAuditStatus + restoreAuditState/persistAuditState（镜像保护）；console 加 /audit 命令与派发；api server 注入 idGen + Auditor"
    exit_signal: "/audit enable|disable|status 端到端可用；enable 后发送写审计 key、disable 后不写；enable→重启→自动恢复开启无需重复 enable"
    status: done
  - action: "配置接通：runtimeconfig 加 [audit]（time_ttl/body_ttl，默认 24h，正数校验）+ DefaultAuditStatePath；main.go 装配 audit.EnableConfig（复用 [redis]）；scripts/linux-service.sh install 写默认 [audit]、upgrade 补 ensure_audit_config_section"
    exit_signal: "TOML 改 TTL 生效；缺 [audit] 回退默认 24h；非法 duration 启动失败；install/upgrade 产出的 toml 含 [audit]"
    status: done
  - action: "测试覆盖：补齐关键场景清单剩余条目（持久化恢复/恢复失败、fail-open、otel span 范围、作用范围排除、TTL 可配），并更新 docs/user/runtime-config.md 与 linux-systemd-deploy.md 的 [audit] 说明"
    exit_signal: "所有验收场景都有可观察证据；go test ./... 全绿；go vet ./... 通过；go fmt 无 diff"
    status: done

