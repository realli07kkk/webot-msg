    exit_signal: "不启动 console 也能用单元测试证明 /login、/exit、/protection 和 /protection status 等补全结果，以及公共前缀、无匹配和普通文本不补全"
    status: done
  - action: "Console LineReader 接入：把 console loop 改为通过 LineReader 读行，保留 RunWithIO 的 buffered 行读取兼容入口"
    exit_signal: "现有 console 单元测试不需要 TTY 仍能通过，原有命令和普通文本发送语义不变"
    status: done
  - action: "本地 TTY terminal reader：在直接 console 入口接入 x/term.Terminal 和 raw mode，Tab 调用同一补全函数"
    exit_signal: "TTY 冒烟中 /log<Tab>、/pro<Tab> 和 /protection st<Tab> 在 Enter 前补全，退出后终端状态恢复"
    status: done
  - action: "Control console 兼容守护：保持 webot-msg console 旧 line mode，不发送协议头，并补 Attach 级测试防止 mixed-version 误输入"
    exit_signal: "fake old server 只收到用户输入；printf '/exit\\n' | webot-msg console 仍能退出"
    status: done
  - action: "文档和回归覆盖：更新用户文档、架构/需求落档，并补齐 control client/server 兼容性相关测试"
    exit_signal: "go test ./... 通过，文档明确 Tab 补全只面向交互式 TTY"
    status: done

