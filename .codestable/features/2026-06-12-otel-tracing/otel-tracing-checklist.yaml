feature: 2026-06-12-otel-tracing
created: 2026-06-12

steps:
  - action: "配置骨架：runtimeconfig 新增 [telemetry] section 的解析、默认值与校验（endpoint / protocol / insecure / service_name / headers / resource_attributes）"
    exit_signal: "单测覆盖缺省、合法、非法（未知 key / 非法 protocol）三类输入"
    status: done
  - action: "计算节点：internal/telemetry 包实现 Setup（Endpoint 为空返回 no-op shutdown；grpc / http 两种 OTLP exporter；组装 resource 与 headers；注册全局 TracerProvider）"
    exit_signal: "单测覆盖未启用 / 启用 / 非法 protocol 三条路径"
    status: done
  - action: "编排接通（入站）：main 在启动序列插入 telemetry.Setup + defer 带超时的 shutdown；api.Server.Start 的 mux 外层包 otelhttp server 中间件"
    exit_signal: "编译绿灯 + 现有测试全过；未配置 [telemetry] 时启动日志无 telemetry 痕迹"
    status: done
  - action: "编排接通（出站）：ilink.Client 改为持有可注入的共享 instrumented transport，保留各调用原有超时语义"
    exit_signal: "编译绿灯 + 现有测试全过"
    status: done
  - action: "端到端验证：本地 OTLP collector 跑通一条 API 发送链路"
    exit_signal: "collector 看到入站 server span 和 iLink 出站 client span，trace_id 相同"
    status: done
  - action: "测试覆盖收尾：补齐验收契约剩余场景（不可达 endpoint、敏感信息约束、insecure 调试路径等）"
    exit_signal: "第 3 节每条验收场景都有可观察证据"
    status: done

checks:
  - item: "TOML [telemetry] schema 与 design 2.1 一致：endpoint / protocol(默认 grpc) / insecure / service_name(默认 webot-msg) / headers map / resource_attributes map"
    source: 名词契约
    status: passed
  - item: "telemetry.Setup 契约：Endpoint 为空 → no-op shutdown + nil；protocol 非 grpc/http → error；正常 → 可 flush 的 shutdown"
    source: 名词契约
    status: passed
  - item: "ilink.Client 持有共享注入 transport，各调用超时语义（含长轮询）不变"
    source: 名词契约
    status: passed
  - item: "启动序列：telemetry.Setup 在 PrepareStorage 之后 app.New 之前，Setup 失败走 fatalStartupError，退出 defer shutdown 带超时上限"
    source: 编排骨架
    status: passed
  - item: "otelhttp 中间件与 transport 无条件挂载，启用与否只由全局 TracerProvider 决定（未配置时 noop）"
    source: 编排骨架
    status: passed
